{% extends 'base.html' %}

{% block title %}
    Confirmar Exclusão - {{ block.super }}
{% endblock %}

{% block content %}
<div class="container mx-auto my-8 px-4">
    <div class="max-w-lg mx-auto">
        <div class="bg-white rounded-lg shadow-md text-center p-8">
            <h1 class="text-2xl font-bold text-danger mb-3">Tem a certeza?</h1>
            <p class="text-lg text-gray-600">Você está prestes a apagar permanentemente a aula:</p>
            <p class="text-xl font-semibold my-4">"{{ aula.titulo }}"</p>
            <p class="text-gray-500">Esta ação não pode ser desfeita.</p>
            <form method="post" class="mt-6">
                {% csrf_token %}
                <div class="flex justify-center space-x-4">
                    <a href="{% url 'cursos:gerir_aulas' pk_curso=aula.curso.pk %}" class="bg-gray-200 text-gray-700 font-semibold py-2 px-6 rounded-md hover:bg-gray-300 transition-colors">Cancelar</a>
                    <button type="submit" class="bg-danger text-white font-semibold py-2 px-6 rounded-md hover:bg-opacity-90 transition-colors">Sim, apagar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
