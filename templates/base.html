{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plataforma de Cursos{% endblock %}</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- (Opcional) Fonte Poppins do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        // Configurações customizadas do Tailwind (cores, fontes, etc.)
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4A69BD', // Azul-Ardósia
                        secondary: '#6c757d',
                        success: '#1ABC9C', // Verde-Azulado
                        danger: '#E74C3C',
                        warning: '#F1C40F',
                        light: '#f8f9fa',
                        dark: '#212529',
                    }
                }
            }
        }
    </script>

    <!-- O nosso CSS customizado -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="bg-gray-100 text-gray-800">

    <div id="particles-js" class="fixed top-0 left-0 w-full h-full z-[-1]"></div>

    {% include 'partials/_navbar.html' %}

    <main class="container mx-auto my-8 px-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Particles.js para o efeito de fundo -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="{% static 'js/particles-config.js' %}"></script>

    <!-- AQUI ESTÁ A CORREÇÃO: Alpine.js para a interatividade -->
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js" defer></script>
</body>
</html>
